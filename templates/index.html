<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多知识库管理系统 | 智能检索助手</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4066ff;
            --primary-light: #6b84ff;
            --primary-dark: #2949d8;
            --success: #00b42a;
            --error: #f53f3f;
            --warning: #ff7d00;
            --bg-light: #f7f8fa;
            --bg-white: #ffffff;
            --text-main: #1d2129;
            --text-secondary: #4e5969;
            --text-placeholder: #86909c;
            --border-light: #e5e6eb;
            --border-hover: #c9cdd4;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.3s ease;
            --sidebar-width: 240px;
            --header-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            width: 100%;
            height: calc(100vh - var(--header-height));
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
            flex: 1;
        }

        /* 顶部导航 */
        .top-nav {
            height: var(--header-height);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-nav h1 {
            font-size: 20px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-nav h1 i {
            font-size: 24px;
        }

        /* 侧边栏导航 */
        .sidebar-nav {
            width: var(--sidebar-width);
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
        }

        .nav-item {
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            width: 100%;
        }

        .nav-item:hover {
            background: var(--bg-light);
            color: var(--primary);
        }

        .nav-item.active {
            background: rgba(64, 102, 255, 0.1);
            color: var(--primary);
            border-left: 4px solid var(--primary);
            border-radius: 0 6px 6px 0;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            overflow: hidden;
        }

        /* 页面容器 */
        .page-container {
            display: none;
            flex: 1;
            min-height: 0;
        }

        .page-container.active {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* 主布局 */
        .content-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* 管理页面布局 - 双栏均衡 */
        .manage-layout {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
            max-width: 100%;
            margin: 0 auto;
        }

        .manage-panel {
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        .manage-panel .panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .manage-panel .panel-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .manage-panel .kb-list {
            max-height: 300px;
        }

        @media (max-width: 1024px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
        }

        /* 左侧面板 */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            flex-shrink: 0;
        }

        .panel-header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .panel-header-bar h2 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-body {
            padding: 20px;
        }

        /* 创建知识库表单 */
        .create-form {
            display: flex;
            gap: 10px;
            margin-bottom: 0;
        }

        .create-form input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .create-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(64, 102, 255, 0.1);
        }

        /* 按钮样式 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(64, 102, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }

        .btn-secondary:hover {
            background: var(--border-light);
            color: var(--primary);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-danger {
            background: var(--error);
        }

        .btn-danger:hover {
            background: #d9363e;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 知识库卡片网格布局 */
        .kb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .kb-grid::-webkit-scrollbar {
            width: 4px;
        }

        .kb-grid::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 2px;
        }

        .kb-card {
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 18px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            background: var(--bg-white);
            display: flex;
            flex-direction: column;
            height: 180px;
        }

        .kb-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .kb-card.active {
            border-color: var(--primary);
            background: rgba(64, 102, 255, 0.03);
            box-shadow: var(--shadow-sm);
        }

        .kb-card.built {
            border-left: 4px solid var(--success);
        }

        .kb-card.unbuilt {
            border-left: 4px solid var(--warning);
        }

        .kb-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .kb-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kb-status-tag {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .kb-status-tag.built {
            background: rgba(0, 180, 42, 0.1);
            color: var(--success);
        }

        .kb-status-tag.unbuilt {
            background: rgba(255, 125, 0, 0.1);
            color: var(--warning);
        }

        .kb-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            flex-grow: 1;
        }

        .kb-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .kb-actions .btn {
            flex: 1;
            min-width: 60px;
        }

        /* 文件列表 */
        .file-list {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
            display: none;
        }

        .file-list.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            font-size: 12px;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
        }

        .file-item:hover {
            background: var(--bg-light);
        }

        .file-item i {
            color: var(--primary);
        }

        .file-empty {
            text-align: center;
            padding: 20px;
            color: var(--text-placeholder);
            font-size: 13px;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed var(--border-light);
            border-radius: var(--radius-md);
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 16px;
            background: var(--bg-light);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(64, 102, 255, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(64, 102, 255, 0.1);
            border-style: solid;
        }

        .upload-area i {
            font-size: 36px;
            color: var(--primary-light);
            margin-bottom: 10px;
            display: block;
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0;
        }

        .upload-area .hint {
            color: var(--text-placeholder);
            font-size: 12px;
            margin-top: 6px;
        }

        /* 进度条 */
        .progress-wrapper {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            display: none;
        }

        .progress-wrapper.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .progress-message {
            color: var(--text-secondary);
        }

        .progress-percent {
            color: var(--primary);
            font-weight: 600;
        }

        .progress-bar-bg {
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* 主内容区 - 右侧 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
            overflow: hidden;
        }

        /* 知识库选择器 - 标签样式 */
        .kb-selector-panel {
            padding: 20px;
        }

        .kb-selector-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kb-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .kb-tag-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .kb-tag-item:hover {
            background: rgba(64, 102, 255, 0.1);
            color: var(--primary);
        }

        .kb-tag-item.selected {
            background: rgba(64, 102, 255, 0.15);
            border-color: var(--primary);
            color: var(--primary-dark);
            font-weight: 500;
        }

        .kb-tag-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .kb-tag-item .check-icon {
            display: none;
        }

        .kb-tag-item.selected .check-icon {
            display: inline;
        }

        .kb-tag-item.selected .unchecked-icon {
            display: none;
        }

        /* 问答区域 - 参考千问设计 */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-white);
            box-shadow: var(--shadow-md);
        }

        .chat-results {
            flex: 1;
            padding: 0;
            overflow-y: auto;
            background: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-message {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            animation: fadeIn 0.3s ease;
            display: flex;
            gap: 12px;
        }

        .chat-message.user {
            background: var(--bg-white);
            justify-content: flex-end;
        }

        .chat-message.ai {
            background: rgba(64, 102, 255, 0.03);
            justify-content: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: var(--primary);
            color: white;
        }

        .message-avatar.ai {
            background: var(--success);
            color: white;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .chat-message.user .message-content {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.ai .message-content {
            background: white;
            border: 1px solid var(--border-light);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-white);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .input-container input {
            width: 100%;
            padding: 14px 50px 14px 16px;
            border: 1px solid var(--border-light);
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            background: var(--bg-light);
        }

        .input-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(64, 102, 255, 0.1);
            background: var(--bg-white);
        }

        .input-container .input-actions {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .input-actions button:hover {
            background: var(--bg-light);
            color: var(--primary);
        }

        /* 结果展示 */
        .result-section {
            margin-bottom: 24px;
        }

        .result-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .question-display {
            padding: 12px 16px;
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            font-size: 15px;
            color: var(--text-main);
            border-left: 3px solid var(--primary);
        }

        /* 知识块面板 */
        .knowledge-panels {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .knowledge-item {
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .knowledge-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg-light);
            cursor: pointer;
            transition: var(--transition);
        }

        .knowledge-header:hover {
            background: var(--border-light);
        }

        .knowledge-header input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .knowledge-source {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
        }

        .knowledge-toggle {
            color: var(--text-secondary);
            transition: transform 0.3s ease;
        }

        .knowledge-item.expanded .knowledge-toggle {
            transform: rotate(180deg);
        }

        .knowledge-content {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .knowledge-item.expanded .knowledge-content {
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .knowledge-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* 最终回答 */
        .answer-box {
            background: linear-gradient(135deg, rgba(64, 102, 255, 0.05) 0%, rgba(64, 102, 255, 0.02) 100%);
            border: 1px solid rgba(64, 102, 255, 0.2);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        .answer-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        .answer-content strong {
            color: var(--primary-dark);
        }

        .answer-content ul, .answer-content ol {
            margin: 8px 0 8px 20px;
        }

        .answer-content li {
            margin: 4px 0;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(64, 102, 255, 0.1);
        }

        /* 加载动画 */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .loading-spinner.dark {
            border-color: var(--border-light);
            border-top-color: var(--primary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 提示信息 */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .alert-success {
            background: rgba(0, 180, 42, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 180, 42, 0.2);
        }

        .alert-error {
            background: rgba(245, 63, 63, 0.1);
            color: var(--error);
            border: 1px solid rgba(245, 63, 63, 0.2);
        }

        .alert-info {
            background: rgba(64, 102, 255, 0.1);
            color: var(--primary);
            border: 1px solid rgba(64, 102, 255, 0.2);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-placeholder);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .sidebar-nav {
                width: 70px;
            }
            
            .nav-item span {
                display: none;
            }
            
            .nav-item {
                justify-content: center;
                padding: 14px 10px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header p {
                font-size: 12px;
            }
            
            .content-layout {
                grid-template-columns: 1fr;
            }

            .manage-layout {
                max-width: 100%;
            }
            
            .kb-actions .btn {
                flex: none;
                padding: 6px 10px;
            }

            .kb-actions .btn span {
                display: none;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .kb-tag-item {
                font-size: 13px;
                padding: 6px 12px;
            }

            .kb-card {
                padding: 14px;
                height: auto;
            }

            .upload-area {
                padding: 25px 15px;
            }

            .message-content {
                max-width: 90%;
            }

            .kb-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav">
        <h1><i class="fas fa-brain"></i> 多知识库管理系统</h1>
    </div>

    <div class="container">
        <!-- 侧边栏导航 -->
        <div class="sidebar-nav">
            <button class="nav-item active" onclick="switchPage('manage-page')">
                <i class="fas fa-database"></i> <span>管理知识库</span>
            </button>
            <button class="nav-item" onclick="switchPage('query-page')">
                <i class="fas fa-comment-dots"></i> <span>问答查询</span>
            </button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 管理页面 -->
            <div id="manage-page" class="page-container active">
                <div class="content-layout manage-layout">
                    <!-- 左侧面板 -->
                    <div class="left-panel manage-panel">
                        <!-- 创建知识库 -->
                        <div class="panel">
                            <div class="panel-header-bar">
                                <h2><i class="fas fa-plus-circle"></i> 创建知识库</h2>
                            </div>
                            <div class="panel-body">
                                <div class="create-form">
                                    <input type="text" id="newKbName" placeholder="输入知识库名称，如：产品手册">
                                    <button class="btn" onclick="createKB()">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 知识库列表 -->
                        <div class="panel">
                            <div class="panel-header-bar">
                                <h2><i class="fas fa-database"></i> 我的知识库</h2>
                                <span id="kbCount" style="font-size: 12px; opacity: 0.9;">0 个</span>
                            </div>
                            <div class="panel-body">
                                <div id="kbGrid" class="kb-grid">
                                    <div class="empty-state">
                                        <i class="fas fa-folder-open"></i>
                                        <p>暂无知识库，请先创建</p>
                                    </div>
                                </div>

                                <!-- 上传区域 -->
                                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                                    <input type="file" id="fileInput" multiple accept=".txt,.pdf,.docx,.doc,.md,.json" style="display: none;" onchange="handleFileUpload()">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <p>点击或拖拽文件到此处上传</p>
                                    <p class="hint">支持 TXT、PDF、Word、Markdown、JSON</p>
                                </div>

                                <!-- 进度显示 -->
                                <div id="progressWrapper" class="progress-wrapper">
                                    <div class="progress-info">
                                        <span class="progress-message" id="progressMessage">准备中...</span>
                                        <span class="progress-percent" id="progressPercent">0%</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" id="progressBar"></div>
                                    </div>
                                </div>

                                <!-- 提示信息 -->
                                <div id="alertBox" class="alert"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 问答页面 -->
            <div id="query-page" class="page-container">
                <div class="content-layout">
                    <!-- 左侧面板 -->
                    <div class="left-panel">
                        <!-- 知识库选择 -->
                        <div class="panel">
                            <div class="panel-header-bar">
                                <h2><i class="fas fa-database"></i> 可用知识库</h2>
                                <span id="availableKbCount" style="font-size: 12px; opacity: 0.9;">0 个</span>
                            </div>
                            <div class="panel-body">
                                <div id="kbTags" class="kb-tags">
                                    <span style="color: var(--text-placeholder); font-size: 14px;">请先创建知识库并构建向量库</span>
                                </div>
                            </div>
                        </div>

                        <!-- 问答历史 -->
                        <div class="panel">
                            <div class="panel-header-bar">
                                <h2><i class="fas fa-history"></i> 最近提问</h2>
                            </div>
                            <div class="panel-body">
                                <div style="color: var(--text-placeholder); text-align: center; padding: 20px;">
                                    <i class="fas fa-comments" style="font-size: 24px; margin-bottom: 8px;"></i>
                                    <p>暂无历史记录</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧面板 -->
                    <div class="right-panel">
                        <!-- 问答面板 -->
                        <div class="chat-panel">
                            <div class="chat-header">
                                <h2><i class="fas fa-comment-dots"></i> 智能问答</h2>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn btn-sm btn-secondary" onclick="clearChat()">
                                        <i class="fas fa-trash"></i> 清空
                                    </button>
                                </div>
                            </div>

                            <div class="chat-results" id="chatResults">
                                <div class="empty-state">
                                    <i class="fas fa-comments"></i>
                                    <p>选择知识库并输入问题开始对话</p>
                                </div>
                            </div>

                            <div class="chat-input-area">
                                <div class="input-wrapper">
                                    <div class="input-container">
                                        <input type="text" id="questionInput" placeholder="输入您的问题，例如：产品的核心功能有哪些？" onkeypress="handleEnter(event)">
                                        <div class="input-actions">
                                            <button onclick="clearQuestion()" title="清空">
                                                <i class="fas fa-times"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <button class="btn" id="submitBtn" onclick="askQuestion()">
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentKB = null;  // 当前选中的上传目标知识库
        let kbData = [];       // 知识库数据
        let selectedKBs = new Set();  // 选中的知识库（用于检索）
        let currentQuestion = '';  // 当前问题
        let buildEventSource = null;  // SSE连接

        // 初始化
        window.onload = function() {
            loadKBList();
            setupDragDrop();
        };

        // 切换页面
        function switchPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page-container').forEach(page => {
                page.classList.remove('active');
            });
            
            // 显示目标页面
            document.getElementById(pageId).classList.add('active');
            
            // 更新导航按钮状态
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 根据页面ID设置对应按钮为激活状态
            if (pageId === 'manage-page') {
                document.querySelector('[onclick="switchPage(\'manage-page\')"]').classList.add('active');
            } else if (pageId === 'query-page') {
                document.querySelector('[onclick="switchPage(\'query-page\')"]').classList.add('active');
            }
        }

        // 加载知识库列表
        async function loadKBList() {
            try {
                // 模拟数据加载，实际应用中这里应该是API调用
                // kbData = [
                //     { name: "产品手册", file_count: 5, is_built: true, knowledge_path: "", vector_path: "" },
                //     { name: "技术文档", file_count: 3, is_built: false, knowledge_path: "", vector_path: "" },
                //     { name: "用户指南", file_count: 7, is_built: true, knowledge_path: "", vector_path: "" }
                // ];
                
                // 实际API调用
                const response = await fetch('/api/kb/list');
                const data = await response.json();

                if (data.success) {
                    kbData = data.data;
                    renderKBGrid();
                    renderKBTags();
                    document.getElementById('kbCount').textContent = `${kbData.length} 个`;
                    document.getElementById('availableKbCount').textContent = `${kbData.filter(kb => kb.is_built).length} 个`;
                }
            } catch (error) {
                showAlert('加载知识库列表失败', 'error');
                console.error('加载知识库失败:', error);
            }
        }

        // 渲染知识库网格
        function renderKBGrid() {
            const container = document.getElementById('kbGrid');

            if (kbData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>暂无知识库，请先创建</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = kbData.map(kb => `
                <div class="kb-card ${kb.is_built ? 'built' : 'unbuilt'} ${currentKB === kb.name ? 'active' : ''}" data-name="${kb.name}" onclick="selectKB('${kb.name}')">
                    <div class="kb-card-header">
                        <div class="kb-name">
                            <i class="fas fa-database"></i>
                            ${kb.name}
                        </div>
                        <span class="kb-status-tag ${kb.is_built ? 'built' : 'unbuilt'}">
                            ${kb.is_built ? '已构建' : '未构建'}
                        </span>
                    </div>
                    <div class="kb-meta">
                        <i class="fas fa-file-alt"></i> ${kb.file_count} 个文件
                    </div>
                    <div class="kb-actions">
                        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); loadKBFiles('${kb.name}')">
                            <i class="fas fa-list"></i>
                        </button>
                        <button class="btn btn-sm ${kb.is_built ? 'btn-success' : ''}" onclick="event.stopPropagation(); buildKB('${kb.name}')">
                            <i class="fas fa-hammer"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteKB('${kb.name}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="file-list" id="fileList_${kb.name}"></div>
                </div>
            `).join('');
        }

        // 渲染知识库标签（问答区选择器）
        function renderKBTags() {
            const container = document.getElementById('kbTags');
            const builtKBs = kbData.filter(kb => kb.is_built);

            if (builtKBs.length === 0) {
                container.innerHTML = '<span style="color: var(--text-placeholder); font-size: 14px;">请先创建知识库并构建向量库</span>';
                return;
            }

            container.innerHTML = kbData.map(kb => {
                const isSelected = selectedKBs.has(kb.name);
                const isDisabled = !kb.is_built;

                return `
                    <div class="kb-tag-item ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}"
                         onclick="${isDisabled ? '' : `toggleKBTag('${kb.name}')`}">
                        <i class="far fa-circle unchecked-icon"></i>
                        <i class="fas fa-check-circle check-icon"></i>
                        <span>${kb.name}</span>
                        ${isDisabled ? '<small>(未构建)</small>' : ''}
                    </div>
                `;
            }).join('');
        }

        // 切换知识库标签选择
        function toggleKBTag(kbName) {
            if (selectedKBs.has(kbName)) {
                selectedKBs.delete(kbName);
            } else {
                selectedKBs.add(kbName);
            }
            renderKBTags();
        }

        // 选择知识库（用于上传）
        function selectKB(kbName) {
            currentKB = kbName;
            renderKBGrid();  // 重新渲染以显示选中状态
            showAlert(`已选择「${kbName}」，点击上传区域添加文件`, 'info');
        }

        // 创建知识库
        async function createKB() {
            const nameInput = document.getElementById('newKbName');
            const name = nameInput.value.trim();

            if (!name) {
                showAlert('请输入知识库名称', 'error');
                return;
            }

            try {
                const response = await fetch('/api/kb/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(data.message, 'success');
                    nameInput.value = '';
                    loadKBList();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('创建失败: ' + error, 'error');
            }
        }

        // 删除知识库
        async function deleteKB(kbName) {
            if (!confirm(`确定要删除「${kbName}」知识库吗？此操作不可恢复！`)) {
                return;
            }

            try {
                const response = await fetch('/api/kb/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: kbName })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(data.message, 'success');
                    if (currentKB === kbName) currentKB = null;
                    selectedKBs.delete(kbName);
                    loadKBList();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('删除失败: ' + error, 'error');
            }
        }

        // 加载知识库文件列表
        async function loadKBFiles(kbName) {
            const fileListEl = document.getElementById(`fileList_${kbName}`);

            // 如果已经显示，则隐藏
            if (fileListEl.classList.contains('show')) {
                fileListEl.classList.remove('show');
                return;
            }

            try {
                const response = await fetch(`/api/kb/files?name=${encodeURIComponent(kbName)}`);
                const data = await response.json();

                if (data.success) {
                    if (data.data.length === 0) {
                        fileListEl.innerHTML = '<div class="file-empty">暂无文件</div>';
                    } else {
                        fileListEl.innerHTML = data.data.map(file => `
                            <div class="file-item">
                                <i class="fas fa-file"></i>
                                <span>${file.name}</span>
                                <span style="margin-left: auto; color: var(--text-placeholder);">
                                    ${formatFileSize(file.size)}
                                </span>
                            </div>
                        `).join('');
                    }
                    fileListEl.classList.add('show');
                }
            } catch (error) {
                console.error('加载文件列表失败:', error);
            }
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 设置拖拽上传
        function setupDragDrop() {
            const uploadArea = document.getElementById('uploadArea');

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');

                if (!currentKB) {
                    showAlert('请先选择一个知识库', 'error');
                    return;
                }

                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    uploadFiles(files);
                }
            });
        }

        // 处理文件上传
        function handleFileUpload() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;

            if (!currentKB) {
                showAlert('请先选择一个知识库', 'error');
                fileInput.value = '';
                return;
            }

            if (files.length > 0) {
                uploadFiles(files);
            }
        }

        // 上传文件
        async function uploadFiles(files) {
            if (!currentKB) {
                showAlert('请先选择一个知识库', 'error');
                return;
            }

            showAlert(`正在上传 ${files.length} 个文件...`, 'info');

            let successCount = 0;
            let failCount = 0;
            let autoBuildKB = null;

            for (const file of Array.from(files)) {
                const formData = new FormData();
                formData.append('kb_name', currentKB);
                formData.append('file', file);

                try {
                    const response = await fetch('/api/kb/upload', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();

                    if (data.success) {
                        successCount++;
                        if (data.auto_build) {
                            autoBuildKB = data.kb_name;
                        }
                    } else {
                        failCount++;
                        console.error(`上传 ${file.name} 失败:`, data.message);
                    }
                } catch (error) {
                    failCount++;
                    console.error(`上传 ${file.name} 失败:`, error);
                }
            }

            // 清空文件输入
            document.getElementById('fileInput').value = '';

            // 显示上传结果
            if (failCount === 0) {
                showAlert(`成功上传 ${successCount} 个文件`, 'success');
            } else {
                showAlert(`成功 ${successCount} 个，失败 ${failCount} 个`, 'error');
            }

            // 刷新列表
            await loadKBList();

            // 自动触发构建
            if (autoBuildKB) {
                setTimeout(() => buildKB(autoBuildKB), 500);
            }
        }

        // 构建知识库
        function buildKB(kbName) {
            const progressWrapper = document.getElementById('progressWrapper');
            const progressBar = document.getElementById('progressBar');
            const progressMessage = document.getElementById('progressMessage');
            const progressPercent = document.getElementById('progressPercent');

            progressWrapper.classList.add('show');
            progressBar.style.width = '0%';
            progressMessage.textContent = '正在初始化...';
            progressPercent.textContent = '0%';

            // 关闭之前的连接
            if (buildEventSource) {
                buildEventSource.close();
            }

            // 建立SSE连接
            buildEventSource = new EventSource(`/build_progress/${encodeURIComponent(kbName)}`);

            buildEventSource.onmessage = function(e) {
                try {
                    const data = JSON.parse(e.data);
                    const { progress, message, success } = data;

                    progressBar.style.width = `${progress}%`;
                    progressMessage.textContent = message;
                    progressPercent.textContent = `${progress}%`;

                    if (progress === 100) {
                        buildEventSource.close();

                        if (success) {
                            showAlert(message, 'success');
                            setTimeout(() => {
                                progressWrapper.classList.remove('show');
                            }, 2000);
                        } else {
                            showAlert(message, 'error');
                        }

                        loadKBList();
                    }
                } catch (err) {
                    console.error('解析进度数据失败:', err);
                }
            };

            buildEventSource.onerror = function() {
                buildEventSource.close();
                showAlert('构建过程出错', 'error');
                progressWrapper.classList.remove('show');
            };
        }

        // 提问
        async function askQuestion() {
            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();

            if (!question) {
                showAlert('请输入问题', 'error');
                return;
            }

            if (selectedKBs.size === 0) {
                showAlert('请至少选择一个知识库', 'error');
                return;
            }

            currentQuestion = question;
            const selectedKBArray = Array.from(selectedKBs);

            // 显示用户消息
            addMessageToChat(question, 'user');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        selected_kbs: selectedKBArray,
                    })
                });

                const data = await response.json();
                renderKnowledgeSelection(data, selectedKBArray);
            } catch (error) {
                addMessageToChat(`请求失败: ${error.message}`, 'ai', true);
            }
        }

        // 在聊天中添加消息
        function addMessageToChat(content, sender, isError = false) {
            const resultsEl = document.getElementById('chatResults');
            
            if (resultsEl.querySelector('.empty-state')) {
                resultsEl.innerHTML = '';
            }

            const timestamp = new Date().toLocaleTimeString();
            const avatarIcon = sender === 'user' ? 'fa-user' : 'fa-robot';
            const messageClass = sender === 'user' ? 'user' : 'ai';
            const messageStyle = isError ? 'alert alert-error show' : '';

            const messageHTML = `
                <div class="chat-message ${messageClass}">
                    <div class="message-avatar ${messageClass}">
                        <i class="fas ${avatarIcon}"></i>
                    </div>
                    <div class="message-content ${messageStyle}">
                        ${content}
                    </div>
                </div>
            `;

            resultsEl.insertAdjacentHTML('beforeend', messageHTML);
            resultsEl.scrollTop = resultsEl.scrollHeight;
        }

        // 渲染结果 - 参考千问的对话样式
        function renderKnowledgeSelection(data, selectedKBs) {
            const resultsEl = document.getElementById('chatResults');

            if (data.error) {
                addMessageToChat(data.error, 'ai', true);
                return;
            }

            // 构建知识检索结果
            let knowledgeHTML = '';

            if (Array.isArray(data.local_knowledge) && data.local_knowledge.length > 0) {
                knowledgeHTML += `
                    <div style="margin-bottom: 16px;">
                        <h3 style="font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 12px;">
                            <i class="fas fa-file-alt"></i> 检索到的知识块
                            <small style="font-weight: normal; color: var(--text-placeholder);">（选择用于生成回答）</small>
                        </h3>
                        <div id="knowledgePanels" style="margin-left: 0;">
                `;

                data.local_knowledge.forEach((item, index) => {
                    if (typeof item === 'object' && item.content) {
                        knowledgeHTML += `
                            <div class="knowledge-item expanded" data-index="${index}" style="margin-bottom: 8px;">
                                <div class="knowledge-header" onclick="toggleKnowledgeItem(this)" style="background: var(--bg-light); border-radius: var(--radius-sm);">
                                    <input type="checkbox" class="kb-checkbox" checked data-index="${index}" onclick="event.stopPropagation()">
                                    <span class="knowledge-source">
                                        <i class="fas fa-database"></i> ${item.source || '未知来源'}
                                    </span>
                                    <i class="fas fa-chevron-down knowledge-toggle"></i>
                                </div>
                                <div class="knowledge-content">
                                    <div class="knowledge-text">${escapeHtml(item.content)}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        knowledgeHTML += `<div class="alert alert-info show">${item}</div>`;
                    }
                });

                knowledgeHTML += `
                        </div>
                        <button class="btn" onclick="generateAnswerWithSelected('${selectedKBs.join(',')}')" style="margin-top: 12px;">
                            <i class="fas fa-magic"></i> 使用选中的知识块生成回答
                        </button>
                    </div>
                `;
            } else {
                knowledgeHTML += `
                    <div class="alert alert-info show">
                        <i class="fas fa-info-circle"></i> 未在选中的知识库中找到相关内容
                    </div>
                `;
            }

            // 添加AI消息
            const timestamp = new Date().toLocaleTimeString();
            const aiMessageHTML = `
                <div class="chat-message ai">
                    <div class="message-avatar ai">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        ${knowledgeHTML}
                    </div>
                </div>
            `;

            resultsEl.insertAdjacentHTML('beforeend', aiMessageHTML);
            resultsEl.scrollTop = resultsEl.scrollHeight;
        }

        // 切换知识块展开/收起
        function toggleKnowledgeItem(header) {
            const item = header.parentElement;
            item.classList.toggle('expanded');
        }

        // 使用选中的知识块生成回答
        async function generateAnswerWithSelected(selectedKBsStr) {
            const selectedKBs = selectedKBsStr.split(',');
            const checkboxes = document.querySelectorAll('.kb-checkbox:checked');
            const selectedKnowledge = [];

            checkboxes.forEach(checkbox => {
                const index = checkbox.dataset.index;
                const item = checkbox.closest('.knowledge-item');
                const content = item.querySelector('.knowledge-text').textContent;
                const source = item.querySelector('.knowledge-source').textContent.trim();
                selectedKnowledge.push({ index: parseInt(index), content, source });
            });

            if (selectedKnowledge.length === 0) {
                showAlert('请至少选择一个知识块', 'error');
                return;
            }

            // 添加加载状态消息
            const loadingMessageHTML = `
                <div class="chat-message ai">
                    <div class="message-avatar ai">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="loading-spinner dark"></div>
                            <span>正在生成回答...</span>
                        </div>
                    </div>
                </div>
            `;

            const resultsEl = document.getElementById('chatResults');
            resultsEl.insertAdjacentHTML('beforeend', loadingMessageHTML);
            resultsEl.scrollTop = resultsEl.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: currentQuestion,
                        selected_kbs: selectedKBs,
                        selected_knowledge: selectedKnowledge
                    })
                });

                const data = await response.json();
                
                // 移除加载消息
                const loadingMessage = resultsEl.lastElementChild;
                if (loadingMessage && loadingMessage.querySelector('.loading-spinner')) {
                    loadingMessage.remove();
                }
                
                // 添加最终回答
                const finalAnswerHTML = `
                    <div class="chat-message ai">
                        <div class="message-avatar ai">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <div style="background: linear-gradient(135deg, rgba(64, 102, 255, 0.05) 0%, rgba(64, 102, 255, 0.02) 100%); border: 1px solid rgba(64, 102, 255, 0.2); border-radius: var(--radius-md); padding: 16px;">
                                ${renderMarkdown(data.final_answer || '生成回答失败')}
                                <div style="margin-top: 12px; display: flex; gap: 8px;">
                                    <button class="btn btn-sm btn-secondary" onclick="copyAnswer()">
                                        <i class="fas fa-copy"></i> 复制
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                resultsEl.insertAdjacentHTML('beforeend', finalAnswerHTML);
                resultsEl.scrollTop = resultsEl.scrollHeight;
            } catch (error) {
                // 移除加载消息
                const loadingMessage = resultsEl.lastElementChild;
                if (loadingMessage && loadingMessage.querySelector('.loading-spinner')) {
                    loadingMessage.remove();
                }
                
                // 添加错误消息
                addMessageToChat(`请求失败: ${error.message}`, 'ai', true);
            }
        }

        // 渲染Markdown
        function renderMarkdown(text) {
            if (!text) return '';
            // 转义HTML
            text = escapeHtml(text);
            // 加粗
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // 无序列表
            text = text.replace(/^• (.*$)/gm, '<li>$1</li>');
            text = text.replace(/^(\d+)\. (.*$)/gm, '<li>$2</li>');
            // 包裹列表
            if (text.includes('<li>')) {
                text = text.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>');
            }
            // 换行
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 复制回答
        function copyAnswer() {
            // 尝试从消息中的回答内容复制
            const messageContents = document.querySelectorAll('.message-content .answer-content, .message-content div[style*="background: linear-gradient"]');
            if (messageContents.length > 0) {
                const text = messageContents[messageContents.length - 1].innerText;
                navigator.clipboard.writeText(text).then(() => {
                    showAlert('回答已复制到剪贴板', 'success');
                }).catch(() => {
                    showAlert('复制失败', 'error');
                });
            }
        }

        // 清空聊天
        function clearChat() {
            const resultsEl = document.getElementById('chatResults');
            resultsEl.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>选择知识库并输入问题开始对话</p>
                </div>
            `;
            document.getElementById('questionInput').value = '';
        }

        // 清空问题
        function clearQuestion() {
            document.getElementById('questionInput').value = '';
        }

        // 处理回车键
        function handleEnter(event) {
            if (event.key === 'Enter') {
                askQuestion();
            }
        }

        // 显示提示
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type} show`;
            alertBox.textContent = message;

            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
